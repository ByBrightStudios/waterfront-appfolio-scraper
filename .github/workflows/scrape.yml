name: Scrape AppFolio Listings

on:
  schedule:
    # Every 15 minutes (stays within GitHub free tier)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger in GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.csv
          git diff --staged --quiet || git commit -m "Update listings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
