<!--
  FRAMER CUSTOM CODE COMPONENT

  Paste this into a Custom Code component in Framer.
  It fetches the published Google Sheet CSV and renders
  a clean, responsive availability table.

  Replace YOUR_SHEET_ID with the actual Google Sheet ID.
-->

<div id="availability-table"></div>

<style>
  #availability-table {
    font-family: inherit;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .avail-loading {
    text-align: center;
    padding: 40px 20px;
    color: #666;
    font-size: 14px;
  }

  .avail-error {
    text-align: center;
    padding: 40px 20px;
    color: #c0392b;
    font-size: 14px;
  }

  .avail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    line-height: 1.5;
  }

  .avail-table thead {
    background: #f8f9fa;
    border-bottom: 2px solid #e9ecef;
  }

  .avail-table th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #495057;
    white-space: nowrap;
  }

  .avail-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #f1f3f5;
    color: #212529;
  }

  .avail-table tbody tr:hover {
    background: #f8f9fa;
  }

  .avail-rent {
    font-weight: 600;
    color: #2c3e50;
  }

  .avail-address a {
    color: inherit;
    text-decoration: none;
  }

  .avail-address a:hover {
    text-decoration: underline;
  }

  .avail-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }

  .avail-badge--available {
    background: #d4edda;
    color: #155724;
  }

  .avail-badge--unavailable {
    background: #f8d7da;
    color: #721c24;
  }

  .avail-updated {
    text-align: right;
    padding: 8px 0;
    font-size: 11px;
    color: #adb5bd;
  }

  /* Responsive: stack on mobile */
  @media (max-width: 768px) {
    .avail-table thead {
      display: none;
    }

    .avail-table tbody tr {
      display: block;
      margin-bottom: 16px;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .avail-table td {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border: none;
    }

    .avail-table td::before {
      content: attr(data-label);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      color: #868e96;
      margin-right: 16px;
    }
  }
</style>

<script>
  (function () {
    const container = document.getElementById('availability-table');

    // ─── CONFIG ────────────────────────────────────
    // Replace with your actual Google Sheet ID
    const SHEET_ID = 'YOUR_SHEET_ID';
    const SHEET_NAME = 'Listings';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

    // Columns to display (match your sheet headers)
    const DISPLAY_COLS = ['Address', 'Unit', 'Rent', 'Beds', 'Baths', 'Sq Ft', 'Available'];

    // ─── FETCH & RENDER ───────────────────────────
    container.innerHTML = '<div class="avail-loading">Loading availability...</div>';

    fetch(CSV_URL)
      .then(res => {
        if (!res.ok) throw new Error('Failed to load listings');
        return res.text();
      })
      .then(csv => {
        const rows = parseCSV(csv);
        if (rows.length < 2) {
          container.innerHTML = '<div class="avail-loading">No listings available right now.</div>';
          return;
        }

        const headers = rows[0];
        const data = rows.slice(1).filter(row => row[0]); // skip empty rows

        // Find column indices
        const colMap = {};
        DISPLAY_COLS.forEach(name => {
          colMap[name] = headers.findIndex(h =>
            h.toLowerCase().trim() === name.toLowerCase().trim()
          );
        });

        // Find link column
        const linkIdx = headers.findIndex(h =>
          h.toLowerCase().trim() === 'link'
        );

        // Find last updated column
        const updatedIdx = headers.findIndex(h =>
          h.toLowerCase().includes('updated')
        );

        // Build table
        let html = '<table class="avail-table">';

        // Header
        html += '<thead><tr>';
        DISPLAY_COLS.forEach(col => {
          html += `<th>${col}</th>`;
        });
        html += '</tr></thead>';

        // Body
        html += '<tbody>';
        data.forEach(row => {
          html += '<tr>';
          DISPLAY_COLS.forEach(col => {
            const idx = colMap[col];
            let val = idx >= 0 ? (row[idx] || '').trim() : '';
            const link = linkIdx >= 0 ? (row[linkIdx] || '').trim() : '';

            // Style specific columns
            if (col === 'Rent') {
              html += `<td data-label="${col}" class="avail-rent">${val}</td>`;
            } else if (col === 'Address' && link) {
              html += `<td data-label="${col}" class="avail-address"><a href="${link}" target="_blank" rel="noopener">${val}</a></td>`;
            } else if (col === 'Available') {
              const isAvailable = val && !val.toLowerCase().includes('unavail');
              const badgeClass = isAvailable ? 'avail-badge--available' : 'avail-badge--unavailable';
              html += `<td data-label="${col}"><span class="avail-badge ${badgeClass}">${val || 'Contact us'}</span></td>`;
            } else {
              html += `<td data-label="${col}">${val}</td>`;
            }
          });
          html += '</tr>';
        });
        html += '</tbody></table>';

        // Last updated timestamp
        if (updatedIdx >= 0 && data[0] && data[0][updatedIdx]) {
          const updated = new Date(data[0][updatedIdx]);
          html += `<div class="avail-updated">Last updated: ${updated.toLocaleString()}</div>`;
        }

        container.innerHTML = html;
      })
      .catch(err => {
        console.error('Availability table error:', err);
        container.innerHTML = '<div class="avail-error">Unable to load availability. Please try again later.</div>';
      });

    // ─── CSV PARSER ───────────────────────────────
    function parseCSV(text) {
      const rows = [];
      let current = [];
      let field = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            field += '"';
            i++; // skip escaped quote
          } else if (char === '"') {
            inQuotes = false;
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            current.push(field);
            field = '';
          } else if (char === '\n' || (char === '\r' && next === '\n')) {
            current.push(field);
            rows.push(current);
            current = [];
            field = '';
            if (char === '\r') i++; // skip \n after \r
          } else {
            field += char;
          }
        }
      }
      // Push last field/row
      if (field || current.length > 0) {
        current.push(field);
        rows.push(current);
      }

      return rows;
    }
  })();
</script>
